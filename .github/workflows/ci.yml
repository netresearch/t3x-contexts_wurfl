name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

# Per-extension test matrix (intentional-drift). Security/quality jobs are in checks.yml.
jobs:
  ci:
    uses: netresearch/typo3-ci-workflows/.github/workflows/ci.yml@main
    permissions:
      contents: read
    with:
      php-versions: '["8.3","8.4","8.5"]'
      typo3-versions: '["^12.4","^13.4"]'
      matrix-exclude: '[{"php":"8.5","typo3":"^12.4"}]'
      run-functional-tests: true
      upload-coverage: true
      functional-test-db: 'mysql'
      db-image: 'mysql:8.4'
      remove-dev-deps: '[{"dep":"saschaegerer/phpstan-typo3","only-for":"^13"}]'
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
